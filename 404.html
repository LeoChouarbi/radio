<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#05060A" />
<title>Signal perdu · 404 — RadioÉcole</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='3' fill='%2300F0FF'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
  .lost{max-width:640px;padding:40px var(--gutter)}
  .lost__code{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(6rem, 22vw, 14rem);
    font-weight:700;line-height:1;letter-spacing:-.05em;
    background:linear-gradient(180deg,#fff 0,#5A6378 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:24px;
  }
  .lost__title{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(1.4rem, 3vw, 2rem);
    color:#fff;margin-bottom:16px;
  }
  .lost__sub{
    font-family:'JetBrains Mono',monospace;
    font-size:.85rem;color:var(--primary);
    text-transform:uppercase;letter-spacing:.18em;
    margin-bottom:32px;
  }
  .lost__wave{width:100%;max-width:400px;margin:0 auto 32px;color:var(--primary);opacity:.5}
  .lost__wave path{stroke-dasharray:600;animation:lostDraw 3s ease-in-out infinite alternate}
  @keyframes lostDraw{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
</style>
</head>
<body>
  <main class="lost">
    <div class="lost__sub">⟶ Signal lost · 404</div>
    <svg class="lost__wave" viewBox="0 0 400 80" aria-hidden="true">
      <path d="M0 40 Q 20 10 40 40 T 80 40 Q 100 70 120 40 T 160 40 Q 180 5 200 75 T 240 40 Q 260 60 280 40 T 320 40 Q 340 20 360 40 T 400 40" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </svg>
    <div class="lost__code">404</div>
    <h1 class="lost__title">Cette fréquence n'émet plus.</h1>
    <p style="color:var(--muted);margin-bottom:32px">La page que vous cherchiez s'est dissoute dans le bruit. Réessayez sur une autre bande.</p>
    <a href="/" class="btn btn--primary">
      ← Retour à l'accueil
    </a>
  </main>
</body>
</html>
